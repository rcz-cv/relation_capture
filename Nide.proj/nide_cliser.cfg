{
    "ident":"Nide Project Configuration",
    "name":"relation_capture",
    "nide-type":"console",
    "build-rules": {
        "yc": {
            "licfile":"Nide.proj/config/yc.lic",
            "verfile":"Nide.proj/config/yc_version.txt",
            "buildno":"Nide.proj/config/yc_version_builds.txt",
            "operation": "debug",
            "products": "build-yc",
            "run": {
                "spawn":["Host", "Worker"],
                "main": "main.nlg"
            },
            "groups": [
            ]
        },
        "aws": {
            "licfile":"Nide.proj/config/aws.lic",
            "verfile":"Nide.proj/config/aws_version.txt",
            "buildno":"Nide.proj/config/aws_version_builds.txt",
            "operation": "debug",
            "products": "build-aws",
            "run": {
                "spawn":["Host", "Worker"],
                "main": "main.nlg"
            },
            "groups": [
            ]
        }
    },
    "build-common": {
        "groups": [
            {
                "groupno": 0,
                "input": "source/",
                "sources": ["ai"],
                "output": "",
                "operations": {
                    "debug": ["license", "version", "syntax"],
                    "release": ["license", "version", "syntax"]
                }
            },
            {
                "groupno": 1,
                "input": "source/",
                "sources": ["main.nlg", "utils.nlg"],
                "output": "",
                "depend_buildno": true,
                "operations": {
                    "debug": ["license", "version", "syntax"],
                    "release": ["license", "version", "syntax"]
                }
            },
            {
                "groupno": 2,
                "input": "libs/node/node_modules/@naanlang/",
                "sources": ["naan"],
                "output": "",
                "operations": {
                    "debug": ["copy"],
                    "release": ["copy"]
                }
            },
            {
                "groupno": 3,
                "input": "libs/node/",
                "sources": ["node_modules"],
                "output": "",
                "operations": {
                    "debug": ["copy"],
                    "release": ["copy"]
                }
            },
            {
                "groupno": 4,
                "input": "libs/node/",
                "sources": ["package.json"],
                "output": "",
                "operations": {
                    "debug": ["version"],
                    "release": ["version"]
                }
            },
            {
                "groupno": 5,
                "input": "Nide.proj/",
                "sources": ["credentials"],
                "output": "",
                "operations": {
                    "debug": ["copy"],
                    "release": ["copy"]
                }
            }
        ]
    }
}
